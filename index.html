<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ane Aranburu</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0C0C0F; --border: #222;
    --text: #f0ede8; --muted: #888;
    --font: 'Inter', sans-serif;
    --margin: 48px;
    --section-gap: 60px;
  }
  html, body { overflow-x: hidden; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; }

  /* NAV */
  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 24px var(--margin); position: sticky; top: 0; z-index: 100;
    background: var(--bg);
  }
  .nav-name { font-size: 13px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text); text-decoration: none; display: inline-block; transition: transform .3s ease; }
  .nav-name:hover { transform: rotate(90deg); }
  .nav-links { display: flex; gap: 4px; }
  .nav-links a { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--text); text-decoration: none; padding: 8px 16px; border-radius: 100px; border: 1px solid transparent; font-weight: 500; transition: border-color .2s; }
  .nav-links a:hover { border-color: var(--border); }

  /* HERO */
  .hero { 
    margin-left: var(--margin); 
    margin-right: var(--margin); 
    padding: 50px 0 var(--section-gap); 
    max-width: 80%; 
  }
  .hero h1 { font-size: 32px; font-weight: 300; line-height: 1.4; color: #fff; margin-bottom: 16px; }
  .hero p { color: #7a7a7a; font-size: 32px; font-weight: 300; line-height: 1.4; }

  /* CAROUSEL */
  .carousel { 
    margin-left: var(--margin); 
    padding-bottom: var(--section-gap); 
    overflow: hidden; 
  }
  .carousel-track { 
    display: flex; 
    gap: 20px; 
    overflow-x: auto;
    padding-right: var(--margin);
    scrollbar-width: none; 
    -ms-overflow-style: none;
  }
  .carousel-track::-webkit-scrollbar { display: none; }

  .card { flex: 0 0 380px; text-decoration: none; color: inherit; }
  .card-media {
    background: #1a1a1f; border-radius: 12px; aspect-ratio: 16/10;
    overflow: hidden; margin-bottom: 14px;
  }
  .card-media video, .card-media img { width: 100%; height: 100%; object-fit: cover; }
  .card-media.blur video, .card-media.blur img { filter: blur(20px) brightness(0.6); }
  .card-meta { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .card-title { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.95); }
  .card-link { 
    font-size: 14px; 
    font-weight: 400; 
    color: rgba(255,255,255,0.5); 
    margin-top: 6px; 
    display: inline-block;
    transition: color 0.2s;
  }
  a.card:hover .card-link { color: #fff; }

  /* BOTTOM */
  .bottom { 
    margin-left: var(--margin); 
    margin-right: var(--margin); 
    padding: 0 0 var(--section-gap); 
    max-width: 80%; 
  }
  .bottom-text { margin-bottom: 40px; }
  .bottom-text p { font-size: 24px; font-weight: 300; line-height: 1.5; color: var(--text); }
  .capabilities-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; font-weight: 500; color: var(--muted); margin-bottom: 14px; }
  .tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag { font-size: 13px; color: var(--text); border: 1px solid #333; border-radius: 100px; padding: 10px 18px; font-weight: 400; }

  /* FOOTER */
  footer { 
    margin-left: var(--margin); 
    margin-right: var(--margin); 
    padding: 40px 0 30px; 
  }
  footer p { font-size: 10px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; font-weight: 500; }

  @media (max-width: 768px) {
    :root { --margin: 24px; --section-gap: 50px; }
    .hero, .bottom { max-width: 100%; }
    .hero { padding: 40px 0 var(--section-gap); }
    .hero h1, .hero p { font-size: 26px; line-height: 1.35; }
    .card { flex: 0 0 300px; }
    .bottom-text p { font-size: 20px; }
    footer { padding: 30px 0; }
  }
  @media (max-width: 480px) {
    :root { --margin: 20px; --section-gap: 40px; }
    .hero { padding: 30px 0 var(--section-gap); }
    .hero h1, .hero p { font-size: 22px; line-height: 1.35; }
    .card { flex: 0 0 260px; }
    .bottom-text p { font-size: 18px; }
    footer { padding: 30px 0; }
  }
</style>
</head>
<body>
